name: Deploy to AKS

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  RESOURCE_GROUP: EADeployCA2-rg
  CLUSTER_NAME: EADeployCA2-aks

jobs:
  deploy:
    name: Deploy AKS Store to cluster
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v5
        with:
          manifests: |
            k8s/aks-store-quickstart.yaml

      - name: Show running resources
        run: |
          echo "=== Pods ==="
          kubectl get pods
          echo "=== Services ==="
          kubectl get services